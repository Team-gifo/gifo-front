name: gifo
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.3+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  go_router: ^17.1.0
  freezed: ^3.2.5
  retrofit: ^4.9.2
  flutter_dotenv: ^6.0.0
  flutter_secure_storage: ^10.0.0
  logger: ^2.6.2
  dio: ^5.9.1
  image_picker: ^1.2.1
  confetti: ^0.8.0
  flutter_svg: ^2.2.3
  toastification: ^3.0.3
  get_it: ^9.2.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  url_launcher: ^6.3.2
  reorderable_grid_view: ^2.2.8
  animated_text_kit: ^4.3.0
  visibility_detector: ^0.4.0+2
  flutter_launcher_icons: ^0.14.4
  jaspr: ^0.22.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.12.1
  json_serializable: ^6.13.0
  retrofit_generator: ^10.2.3

flutter_launcher_icons:
  web:
    generate: true
    image_path: "assets/images/icons/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/images/item/
    - assets/images/icons/
    - assets/images/example/
    - assets/lottie/

  fonts:
    - family: PFStardust
      fonts:
        - asset: assets/fonts/pf_stardust_3_0.ttf
        - asset: assets/fonts/pf_stardust_3_0_bold.ttf
          weight: 700
        - asset: assets/fonts/pf_stardust_3_0_extrabold.ttf
          weight: 800
    - family: PFStardustS
      fonts:
        - asset: assets/fonts/pf_stardust_3_0_s.ttf
        - asset: assets/fonts/pf_stardust_3_0_s_bold.ttf
          weight: 700
        - asset: assets/fonts/pf_stardust_3_0_s_extrabold.ttf
          weight: 800
    - family: WantedSans
      fonts:
        - asset: assets/fonts/WantedSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/WantedSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/WantedSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/WantedSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/WantedSans-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/WantedSans-Black.ttf
          weight: 900
