name: gifo
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  go_router: ^17.1.0
  freezed: ^3.2.5
  retrofit: ^4.9.2
  flutter_dotenv: ^6.0.0
  flutter_secure_storage: ^10.0.0
  logger: ^2.6.2
  dio: ^5.9.1
  image_picker: ^1.2.1
  confetti: ^0.8.0
  flutter_svg: ^2.2.3
  toastification: ^3.0.3
  get_it: ^9.2.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.12.1
  json_serializable: ^6.13.0
  retrofit_generator: ^10.2.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/item/
    - assets/lottie/

  fonts:
    - family: PFStardust
      fonts:
        - asset: assets/fonts/pf_stardust_3_0.ttf
        - asset: assets/fonts/pf_stardust_3_0_bold.ttf
          weight: 700
        - asset: assets/fonts/pf_stardust_3_0_extrabold.ttf
          weight: 800
    - family: PFStardustS
      fonts:
        - asset: assets/fonts/pf_stardust_3_0_s.ttf
        - asset: assets/fonts/pf_stardust_3_0_s_bold.ttf
          weight: 700
        - asset: assets/fonts/pf_stardust_3_0_s_extrabold.ttf
          weight: 800

