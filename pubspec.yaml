name: gifo
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  go_router: ^17.1.0
  freezed: ^3.2.5
  retrofit: ^4.9.2
  flutter_dotenv: ^6.0.0
  flutter_secure_storage: ^10.0.0
  logger: ^2.6.2
  dio: ^5.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.11.1
  json_serializable: ^6.13.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/

  fonts:
    - family: PFStardust
      fonts:
        - asset: assets/fonts/PF스타더스트 3.0.ttf
        - asset: assets/fonts/PF스타더스트 3.0 Bold.ttf
          weight: 700
        - asset: assets/fonts/PF스타더스트 3.0 ExtraBold.ttf
          weight: 800
    - family: PFStardustS
      fonts:
        - asset: assets/fonts/PF스타더스트 3.0 S.ttf
        - asset: assets/fonts/PF스타더스트 3.0 S Bold.ttf
          weight: 700
        - asset: assets/fonts/PF스타더스트 3.0 S ExtraBold.ttf
          weight: 800

