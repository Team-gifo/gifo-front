<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  
  <!-- 기본 검색 엔진 최적화 (SEO) 태그 -->
  <meta name="description" content="기억에 남고 특별한 감동을 선물하고 싶다면 오직 한 사람만을 위한 생일 사이트를 포장하고, 전달해주세요. Gifo에서 지금 무료로 만들어보세요.">
  <meta name="keywords" content="Gifo, 기포, 선물, 생일, 이벤트, 포장, 특별한 선물, 웹사이트 선물, 모바일 교환권 대신">
  <meta name="robots" content="index, follow">

  <!-- Open Graph (소셜 미디어 공유용) -->
  <meta property="og:title" content="Gifo - 세상에 단 하나뿐인 특별한 선물 포장">
  <meta property="og:description" content="특별한 날, 당신만의 마음을 꾹꾹 눌러 담아 오직 한 사람만을 위한 특별한 웹 공간을 만들고 전달해보세요.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://gifo.co.kr/">
  <meta property="og:image" content="https://gifo.co.kr/assets/images/title_logo.png">
  <meta property="og:site_name" content="Gifo">
  <!-- 모바일 뷰포트 영역을 끝까지 확장하고 주소창 색상을 검은색으로 변경 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Gifo - 세상에 단 하나뿐인 특별한 선물 포장">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Gifo - 세상에 단 하나뿐인 특별한 선물 포장</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #000000;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
